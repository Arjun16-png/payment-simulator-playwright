<!DOCTYPE html>
<html>
    <head>
        <title>Payment Simulator</title>
    </head>
    <body>
        <h1>Payment Simulator</h1>

        <input id="amount" placeholder="Amount"/>
        <button type="button" onclick="submitPayment()">Pay</button>

        <p id="result"></p>
            
            <script>
                let lastWasTimeout = false;

                function submitPayment() {
                    const amount = parseFloat(document.getElementById("amount").value);
                    let response;

                    if (isNaN(amount) || amount <= 0) {
                      response = "INVALID_AMOUNT";
                    } else if (amount === 999) {
                        if (!lastWasTimeout) {
                        response = "68 - TIMEOUT";
                        lastWasTimeout = true;
                        } else {
                        response = "00 - SUCCESS";
                        lastWasTimeout = false;
                        }
                    } else if (amount > 1000) {
                        response = "51 - INSUFFICIENT_FUNDS";
                        lastWasTimeout = false;
                    } else {
                        response = "00 - SUCCESS";
                        lastWasTimeout = false;
                    }

                document.getElementById("result").innerText = response;
                }
            </script>
    </body>
</html>
